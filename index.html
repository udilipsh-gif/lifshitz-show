<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>האחיות לבית ליפשיץ | מופע סטנד-אפ בקיסריה</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1d1d26 0%, #111 100%);
            color: #fff;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* סגנון כרזת הגיבור (Hero Poster) */
        .poster-container {
            width: 100%;
            max-width: 900px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            border-radius: 20px;
            overflow: hidden;
            margin-top: 30px;
        }

        .poster-image {
            width: 100%;
            display: block;
        }

        /* סגנון כרטיס המכירה (Ticket-style Container) */
        .ticket-container {
            background-color: #fff;
            color: #333;
            padding: 50px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(255, 71, 87, 0.2);
            text-align: center;
            max-width: 500px;
            width: 90%;
            margin-top: 50px;
            margin-bottom: 50px;
            position: relative;
        }

        /* אפקט חיתוך כרטיס */
        .ticket-container::before, .ticket-container::after {
            content: '';
            position: absolute;
            width: 30px;
            height: 30px;
            background-color: #111;
            border-radius: 50%;
            top: 50%;
            transform: translateY(-50%);
        }
        .ticket-container::before { left: -15px; }
        .ticket-container::after { right: -15px; }

        h1 {
            color: #ff4757;
            font-size: 32px;
            margin-top: 0;
            margin-bottom: 10px;
        }

        p.description {
            color: #57606f;
            margin-bottom: 40px;
            font-size: 18px;
        }

        .form-group {
            margin-bottom: 25px;
            text-align: right;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
            color: #333;
        }

        input[type="number"], input[type="text"] {
            width: 100%;
            padding: 15px;
            border: 2px solid #dfe4ea;
            border-radius: 10px;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 16px;
        }

        button {
            background: linear-gradient(135deg, #ff4757 0%, #ff6b81 100%);
            color: white;
            border: none;
            padding: 20px;
            font-size: 20px;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s, box-shadow 0.2s;
            font-weight: bold;
            margin-top: 15px;
            box-shadow: 0 5px 15px rgba(255, 71, 87, 0.4);
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 71, 87, 0.5);
        }

        #success-message {
            display: none;
            margin-top: 30px;
            padding: 25px;
            background: linear-gradient(135deg, #2ed573 0%, #26af61 100%);
            color: white;
            border-radius: 12px;
            font-weight: bold;
            font-size: 20px;
            box-shadow: 0 5px 15px rgba(46, 213, 115, 0.3);
        }
    </style>
</head>
<body>

    <div class="poster-container">
        <img src="https://github.com/udilipsh-gif/lifshitz-show/blob/main/Gemini_Generated_Image_p633rxp633rxp633.png" alt="כרזת מופע האחיות לבית ליפשיץ" class="poster-image">
    </div>

    <div class="ticket-container">
        <h1>הבטיחו את מקומכם!</h1>
        <p class="description">ערב קורע מצחוק באמפי קיסריה. מלאו פרטים (בכאילו) להזמנה.</p>
        
        <div id="booking-form">
            <div class="form-group">
                <label for="name">שם מלא:</label>
                <input type="text" id="name" placeholder="הכנס/י שם מלא">
            </div>
            <div class="form-group">
                <label for="tickets">מספר כרטיסים:</label>
                <input type="number" id="tickets" min="1" max="10" value="1">
            </div>
            
            <button onclick="buyTickets()">לרכישת כרטיסים (בכאילו)</button>
        </div>

        <div id="success-message">
            🎉 🎉 🎉<br>
            ! חשבונך חוייב ב560 ש"ח איזה כיף! הכרטיסים הוזמנו בהצלחה.<br>
            נתראה בקיסריה ב-01.04.2026!
        </div>
    </div>

    <script>
        function buyTickets() {
            var name = document.getElementById('name').value;
            
            if(name.trim() === "") {
                alert("נא להזין שם מלא כדי שנוכל (בכאילו) לשמור לכם מקום! :)");
                return;
            }
            
            // הסתרת טופס ההזמנה והצגת הודעת ההצלחה
            document.getElementById('booking-form').style.display = 'none';
            document.getElementById('success-message').style.display = 'block';
        }
    </script>
</body>
</html>
