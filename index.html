<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>הופעת הסטנדאפ של השנה</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1d1d26;
            color: white;
            text-align: center;
            padding: 50px 20px;
        }

        .container {
            background-color: #2b2b36;
            max-width: 600px;
            margin: 0 auto;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* כאן מוגדר העיצוב של התמונה */
        img {
            max-width: 100%;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 24px;
            color: #ff4757;
            margin-bottom: 20px;
        }

        .buy-button {
            display: inline-block;
            background-color: #2ed573;
            color: white;
            padding: 15px 40px;
            font-size: 22px;
            font-weight: bold;
            text-decoration: none;
            border-radius: 50px;
            margin-top: 20px;
            transition: background-color 0.3s;
        }

            .buy-button:hover {
                background-color: #26af61;
            }
    </style>
</head>
<body>

    <div class="container">

        <img src="picture.jpg" alt="כרזת המופע">

        <h1>הינכם מוזמנים להופעת הסטנדאפ של השנה של האחיות לבית ליפשיץ.</h1>
        <p>לרכישה לחצו כאן:</p>

        <a href="success.html" class="buy-button">לרכישה</a>

    </div>

</body>
</html>
